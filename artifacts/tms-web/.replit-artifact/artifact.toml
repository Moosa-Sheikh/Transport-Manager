kind = "web"
previewPath = "/"
title = "Transport Management System"
version = "1.0.0"
id = "artifacts/tms-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19954

[services.development]
run = "pnpm --filter @workspace/tms-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tms-web", "run", "build" ]
publicDir = "artifacts/tms-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19954"
BASE_PATH = "/"
