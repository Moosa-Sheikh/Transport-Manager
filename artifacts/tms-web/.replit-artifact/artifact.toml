kind = "web"
previewPath = "/"
title = "Transport Management System"
version = "1.0.0"
id = "tms-web-frontend-001"

[[services]]
localPort = 19954
name = "TMS Web"
paths = ["/"]

[services.env]
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/tms-web run dev"

[services.development.env]
PORT = "19954"
BASE_PATH = "/"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/tms-web", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "19954"
BASE_PATH = "/"
