  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips with optional filters
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: truck_id
          in: query
          schema:
            type: integer
        - name: driver_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [Open, Closed]
        - name: profit
          in: query
          schema:
            type: string
            enum: [positive, negative]
