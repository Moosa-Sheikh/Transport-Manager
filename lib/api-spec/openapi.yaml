openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: customers
    description: Customer management
  - name: drivers
    description: Driver management
  - name: trucks
    description: Truck management
  - name: cities
    description: City management
  - name: expenseTypes
    description: Expense type management
  - name: trips
    description: Trip management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      description: Authenticate with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      description: Destroy the current session
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masters/customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /masters/customers/{id}:
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masters/drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List drivers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Driver list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Driver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /masters/drivers/{id}:
    put:
      operationId: updateDriver
      tags: [drivers]
      summary: Update driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "200":
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      summary: Delete driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Driver deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masters/trucks:
    get:
      operationId: listTrucks
      tags: [trucks]
      summary: List trucks
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Truck list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Truck"
    post:
      operationId: createTruck
      tags: [trucks]
      summary: Create truck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckInput"
      responses:
        "201":
          description: Truck created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /masters/trucks/{id}:
    put:
      operationId: updateTruck
      tags: [trucks]
      summary: Update truck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckInput"
      responses:
        "200":
          description: Truck updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTruck
      tags: [trucks]
      summary: Delete truck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Truck deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masters/cities:
    get:
      operationId: listCities
      tags: [cities]
      summary: List cities
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: City list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"
    post:
      operationId: createCity
      tags: [cities]
      summary: Create city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityInput"
      responses:
        "201":
          description: City created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /masters/cities/{id}:
    put:
      operationId: updateCity
      tags: [cities]
      summary: Update city
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityInput"
      responses:
        "200":
          description: City updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCity
      tags: [cities]
      summary: Delete city
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: City deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masters/expense-types:
    get:
      operationId: listExpenseTypes
      tags: [expenseTypes]
      summary: List expense types
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Expense type list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseType"
    post:
      operationId: createExpenseType
      tags: [expenseTypes]
      summary: Create expense type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseTypeInput"
      responses:
        "201":
          description: Expense type created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseType"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /masters/expense-types/{id}:
    put:
      operationId: updateExpenseType
      tags: [expenseTypes]
      summary: Update expense type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseTypeInput"
      responses:
        "200":
          description: Expense type updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseType"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteExpenseType
      tags: [expenseTypes]
      summary: Delete expense type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense type deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips with optional filters
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: truck_id
          in: query
          schema:
            type: integer
        - name: driver_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [Open, Closed]
      responses:
        "200":
          description: Trip list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripWithDetails"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripWithDetails"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripWithDetails"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trips/{id}/close:
    put:
      operationId: closeTrip
      tags: [trips]
      summary: Close an open trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripWithDetails"
        "400":
          description: Trip already closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}/loads:
    get:
      operationId: listTripLoads
      tags: [trips]
      summary: List loads for a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Load list with income summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripLoadsResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addTripLoad
      tags: [trips]
      summary: Add a load to a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripLoadInput"
      responses:
        "201":
          description: Load added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripLoadWithIncome"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trips/{id}/loads/{loadId}:
    delete:
      operationId: deleteTripLoad
      tags: [trips]
      summary: Delete a load from a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: loadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Load deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Trip is closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
        - id
        - username
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name]
    CustomerInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        companyName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required: [name]

    Driver:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        salary:
          type: string
        tripCommission:
          type: string
        createdAt:
          type: string
      required: [id, name]
    DriverInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          nullable: true
        salary:
          type: string
        tripCommission:
          type: string
      required: [name]

    Truck:
      type: object
      properties:
        id:
          type: integer
        truckNumber:
          type: string
        ownerType:
          type: string
          enum: [Owned, Rented]
        model:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, truckNumber, ownerType]
    TruckInput:
      type: object
      properties:
        truckNumber:
          type: string
          minLength: 1
        ownerType:
          type: string
          enum: [Owned, Rented]
        model:
          type: string
          nullable: true
      required: [truckNumber, ownerType]

    City:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required: [id, name]
    CityInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]

    ExpenseType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required: [id, name]
    ExpenseTypeInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]

    TripInput:
      type: object
      properties:
        tripDate:
          type: string
          format: date
        truckId:
          type: integer
        driverId:
          type: integer
        fromCityId:
          type: integer
        toCityId:
          type: integer
      required: [tripDate, truckId, driverId, fromCityId, toCityId]

    TripWithDetails:
      type: object
      properties:
        id:
          type: integer
        tripDate:
          type: string
        truckId:
          type: integer
        truckNumber:
          type: string
        driverId:
          type: integer
        driverName:
          type: string
        fromCityId:
          type: integer
        fromCityName:
          type: string
        toCityId:
          type: integer
        toCityName:
          type: string
        status:
          type: string
          enum: [Open, Closed]
        createdAt:
          type: string
        income:
          type: number
      required: [id, tripDate, truckId, truckNumber, driverId, driverName, fromCityId, fromCityName, toCityId, toCityName, status, income]

    TripLoadInput:
      type: object
      properties:
        biltyNumber:
          type: string
          minLength: 1
        customerId:
          type: integer
        itemDescription:
          type: string
        weight:
          type: string
        freight:
          type: string
        loadingCharges:
          type: string
        unloadingCharges:
          type: string
        brokerCommission:
          type: string
      required: [biltyNumber, customerId]

    TripLoadWithIncome:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        biltyNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        itemDescription:
          type: string
          nullable: true
        weight:
          type: string
          nullable: true
        freight:
          type: string
        loadingCharges:
          type: string
        unloadingCharges:
          type: string
        brokerCommission:
          type: string
        netLoadIncome:
          type: number
        createdAt:
          type: string
      required: [id, tripId, biltyNumber, customerId, customerName, freight, loadingCharges, unloadingCharges, brokerCommission, netLoadIncome]

    TripIncomeSummary:
      type: object
      properties:
        totalFreight:
          type: number
        totalLoadingCharges:
          type: number
        totalUnloadingCharges:
          type: number
        totalBrokerCommission:
          type: number
        tripIncome:
          type: number
      required: [totalFreight, totalLoadingCharges, totalUnloadingCharges, totalBrokerCommission, tripIncome]

    TripLoadsResponse:
      type: object
      properties:
        loads:
          type: array
          items:
            $ref: "#/components/schemas/TripLoadWithIncome"
        summary:
          $ref: "#/components/schemas/TripIncomeSummary"
      required: [loads, summary]
