components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
        - id
        - username
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name]
    CustomerInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        companyName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required: [name]

    Driver:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        salary:
          type: string
        createdAt:
          type: string
      required: [id, name]
    DriverInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          nullable: true
        salary:
          type: string
      required: [name]

    Truck:
      type: object
      properties:
        id:
          type: integer
        truckNumber:
          type: string
        ownerType:
          type: string
          enum: [Owned, Rented]
        model:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, truckNumber, ownerType]
    TruckInput:
      type: object
      properties:
        truckNumber:
          type: string
          minLength: 1
        ownerType:
          type: string
          enum: [Owned, Rented]
        model:
          type: string
          nullable: true
      required: [truckNumber, ownerType]

    City:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required: [id, name]
    CityInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]

    ExpenseType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
      required: [id, name]
    ExpenseTypeInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]

    TripCommissionInput:
      type: object
      properties:
        driverCommission:
          type: string
      required: [driverCommission]

    TripInput:
      type: object
      properties:
        tripDate:
          type: string
          format: date
        truckId:
          type: integer
        driverId:
          type: integer
        fromCityId:
          type: integer
        toCityId:
          type: integer
        driverCommission:
          type: string
      required: [tripDate, truckId, driverId, fromCityId, toCityId]

    TripWithDetails:
      type: object
      properties:
        id:
          type: integer
        tripDate:
          type: string
        truckId:
          type: integer
        truckNumber:
          type: string
        driverId:
          type: integer
        driverName:
          type: string
        fromCityId:
          type: integer
        fromCityName:
          type: string
        toCityId:
          type: integer
        toCityName:
          type: string
        driverCommission:
          type: string
        status:
          type: string
          enum: [Open, Closed]
        createdAt:
          type: string
        income:
          type: number
        expense:
          type: number
        profit:
          type: number
        totalReceived:
          type: number
        totalAdvances:
          type: number
        actualProfit:
          type: number
      required: [id, tripDate, truckId, truckNumber, driverId, driverName, fromCityId, fromCityName, toCityId, toCityName, status, income, expense, profit, totalReceived, totalAdvances, actualProfit]

    TripLoadInput:
      type: object
      properties:
        biltyNumber:
          type: string
          minLength: 1
        customerId:
          type: integer
        itemDescription:
          type: string
        weight:
          type: string
        freight:
          type: string
        loadingCharges:
          type: string
        unloadingCharges:
          type: string
        brokerCommission:
          type: string
      required: [biltyNumber, customerId]

    TripLoadWithIncome:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        biltyNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        itemDescription:
          type: string
          nullable: true
        weight:
          type: string
          nullable: true
        freight:
          type: string
        loadingCharges:
          type: string
        unloadingCharges:
          type: string
        brokerCommission:
          type: string
        netLoadIncome:
          type: number
        createdAt:
          type: string
      required: [id, tripId, biltyNumber, customerId, customerName, freight, loadingCharges, unloadingCharges, brokerCommission, netLoadIncome]

    TripIncomeSummary:
      type: object
      properties:
        totalFreight:
          type: number
        totalLoadingCharges:
          type: number
        totalUnloadingCharges:
          type: number
        totalBrokerCommission:
          type: number
        tripIncome:
          type: number
      required: [totalFreight, totalLoadingCharges, totalUnloadingCharges, totalBrokerCommission, tripIncome]

    TripLoadsResponse:
      type: object
      properties:
        loads:
          type: array
          items:
            $ref: "#/components/schemas/TripLoadWithIncome"
        summary:
          $ref: "#/components/schemas/TripIncomeSummary"
      required: [loads, summary]

    TripExpenseInput:
      type: object
      properties:
        expenseTypeId:
          type: integer
        amount:
          type: string
        expenseDate:
          type: string
          format: date
        notes:
          type: string
      required: [expenseTypeId, amount, expenseDate]

    TripExpenseWithType:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        expenseTypeId:
          type: integer
        expenseTypeName:
          type: string
        amount:
          type: string
        expenseDate:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, tripId, expenseTypeId, expenseTypeName, amount, expenseDate]

    TripExpensesResponse:
      type: object
      properties:
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/TripExpenseWithType"
        totalExpense:
          type: number
      required: [expenses, totalExpense]

    CustomerPaymentInput:
      type: object
      properties:
        amount:
          type: string
        paymentDate:
          type: string
          format: date
